<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="lg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fff4c4"/>
      <stop offset="45%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#8a6b1e"/>
    </radialGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="50" cy="88" rx="28" ry="6" fill="#c9a227" opacity="0.25"/>
  <ellipse cx="50" cy="12" rx="26" ry="5" fill="#ffd966" opacity="0.2"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#lg)" stroke-width="5" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="38" fill="#0a0a0a"/>
  <circle cx="50" cy="50" r="38" fill="url(#shine)"/>
  <text x="50" y="62" text-anchor="middle" font-size="38" font-weight="700" font-family="Georgia, Times New Roman, serif" fill="url(#lg)">$</text>
</svg>
